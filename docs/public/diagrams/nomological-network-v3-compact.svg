<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 440" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="a3" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="7" markerHeight="5" orient="auto-start-reverse">
      <path d="M 0 0 L 10 3 L 0 6 Z" fill="#475569"/>
    </marker>
  </defs>

  <!-- Section labels -->
  <text x="400" y="28" fill="#6366f1" font-size="11" font-weight="600" text-anchor="middle" letter-spacing="2">THEORETICAL CONSTRUCTS</text>
  <text x="400" y="408" fill="#10b981" font-size="11" font-weight="600" text-anchor="middle" letter-spacing="2">OBSERVABLES</text>

  <!-- Construct nodes (top row) -->
  <rect x="20" y="45" width="170" height="48" rx="8" fill="#312e81" stroke="#6366f1" stroke-width="1.5"/>
  <text x="105" y="74" fill="#e0e7ff" font-size="12.5" font-weight="500" text-anchor="middle">Previous-token head</text>

  <rect x="215" y="45" width="170" height="48" rx="8" fill="#312e81" stroke="#6366f1" stroke-width="1.5"/>
  <text x="300" y="68" fill="#e0e7ff" font-size="12.5" font-weight="500" text-anchor="middle">Copying via W</text>
  <text x="348" y="77" fill="#c7d2fe" font-size="9" text-anchor="middle">OV</text>

  <rect x="415" y="45" width="170" height="48" rx="8" fill="#312e81" stroke="#6366f1" stroke-width="1.5"/>
  <text x="500" y="74" fill="#e0e7ff" font-size="12.5" font-weight="500" text-anchor="middle">In-context learning</text>

  <rect x="610" y="45" width="175" height="48" rx="8" fill="#312e81" stroke="#6366f1" stroke-width="1.5"/>
  <text x="697" y="74" fill="#e0e7ff" font-size="12.5" font-weight="500" text-anchor="middle">Training phase change</text>

  <!-- Edges from constructs to center -->
  <line x1="105" y1="93" x2="355" y2="195" stroke="#475569" stroke-width="1.2"/>
  <line x1="300" y1="93" x2="380" y2="195" stroke="#475569" stroke-width="1.2"/>
  <line x1="500" y1="93" x2="405" y2="195" stroke="#475569" stroke-width="1.2"/>
  <line x1="697" y1="93" x2="430" y2="195" stroke="#475569" stroke-width="1.2"/>

  <!-- Edge labels (constructs) -->
  <text x="210" y="140" fill="#94a3b8" font-size="9.5" text-anchor="middle" transform="rotate(-28, 210, 140)" font-style="italic">compositional partner</text>
  <text x="335" y="142" fill="#94a3b8" font-size="9.5" text-anchor="middle" transform="rotate(-58, 335, 142)" font-style="italic">structural signature</text>
  <text x="460" y="140" fill="#94a3b8" font-size="9.5" text-anchor="middle" transform="rotate(58, 460, 140)" font-style="italic">behavioral prediction</text>
  <text x="580" y="140" fill="#94a3b8" font-size="9.5" text-anchor="middle" transform="rotate(28, 580, 140)" font-style="italic">dynamics prediction</text>

  <!-- Central node -->
  <ellipse cx="400" cy="220" rx="80" ry="38" fill="#3b82f6" stroke="#1d4ed8" stroke-width="2.5"/>
  <text x="400" y="216" fill="#fff" font-size="15" font-weight="700" text-anchor="middle">Induction</text>
  <text x="400" y="234" fill="#fff" font-size="15" font-weight="700" text-anchor="middle">head</text>

  <!-- Edges from center to observables -->
  <line x1="355" y1="255" x2="140" y2="335" stroke="#475569" stroke-width="1.2"/>
  <line x1="400" y1="258" x2="400" y2="335" stroke="#475569" stroke-width="1.2"/>
  <line x1="440" y1="255" x2="660" y2="335" stroke="#475569" stroke-width="1.2"/>

  <!-- Edge labels (observables) -->
  <text x="230" y="305" fill="#94a3b8" font-size="9.5" text-anchor="middle" transform="rotate(20, 230, 305)" font-style="italic">observable</text>
  <text x="420" y="300" fill="#94a3b8" font-size="9.5" text-anchor="start" font-style="italic">observable</text>
  <text x="568" y="305" fill="#94a3b8" font-size="9.5" text-anchor="middle" transform="rotate(-20, 568, 305)" font-style="italic">observable</text>

  <!-- Observable nodes (bottom row) -->
  <rect x="35" y="340" width="210" height="48" rx="8" fill="#064e3b" stroke="#10b981" stroke-width="1.5"/>
  <text x="140" y="360" fill="#d1fae5" font-size="12" font-weight="500" text-anchor="middle">Attention pattern on</text>
  <text x="140" y="376" fill="#d1fae5" font-size="12" font-weight="500" text-anchor="middle">repeated sequences</text>

  <rect x="295" y="340" width="210" height="48" rx="8" fill="#064e3b" stroke="#10b981" stroke-width="1.5"/>
  <text x="400" y="360" fill="#d1fae5" font-size="12" font-weight="500" text-anchor="middle">Loss curve</text>
  <text x="400" y="376" fill="#d1fae5" font-size="12" font-weight="500" text-anchor="middle">inflection point</text>

  <rect x="555" y="340" width="210" height="48" rx="8" fill="#064e3b" stroke="#10b981" stroke-width="1.5"/>
  <text x="660" y="360" fill="#d1fae5" font-size="12" font-weight="500" text-anchor="middle">Cross-model</text>
  <text x="660" y="376" fill="#d1fae5" font-size="12" font-weight="500" text-anchor="middle">replication</text>
</svg>
