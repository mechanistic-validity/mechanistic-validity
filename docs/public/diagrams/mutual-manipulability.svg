<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 380" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arU" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="8" markerHeight="5" orient="auto">
      <path d="M 0 0 L 10 3 L 0 6 Z" fill="#3b82f6"/>
    </marker>
    <marker id="arD" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="8" markerHeight="5" orient="auto">
      <path d="M 0 0 L 10 3 L 0 6 Z" fill="#f59e0b"/>
    </marker>
  </defs>

  <!-- Two boxes: Component and Behavior -->
  <rect x="80" y="70" width="220" height="90" rx="12" fill="#1e293b" stroke="#3b82f6" stroke-width="2"/>
  <text x="190" y="105" fill="#93c5fd" font-size="11" font-weight="500" text-anchor="middle" text-transform="uppercase" letter-spacing="1.5">COMPONENT</text>
  <text x="190" y="130" fill="#f1f5f9" font-size="15" font-weight="600" text-anchor="middle">Name-mover heads</text>
  <text x="190" y="148" fill="#94a3b8" font-size="11" text-anchor="middle">(9.9, 9.6, 10.0)</text>

  <rect x="400" y="70" width="220" height="90" rx="12" fill="#1e293b" stroke="#f59e0b" stroke-width="2"/>
  <text x="510" y="105" fill="#fcd34d" font-size="11" font-weight="500" text-anchor="middle" text-transform="uppercase" letter-spacing="1.5">BEHAVIOR</text>
  <text x="510" y="130" fill="#f1f5f9" font-size="15" font-weight="600" text-anchor="middle">IOI task</text>
  <text x="510" y="148" fill="#94a3b8" font-size="11" text-anchor="middle">(indirect object identification)</text>

  <!-- Bottom-up arrow (blue) -->
  <path d="M 300 130 L 395 130" stroke="#3b82f6" stroke-width="2" fill="none" marker-end="url(#arU)"/>
  <text x="348" y="122" fill="#3b82f6" font-size="11" font-weight="600" text-anchor="middle">Ablate component</text>

  <!-- Top-down arrow (amber) -->
  <path d="M 400 100 L 305 100" stroke="#f59e0b" stroke-width="2" fill="none" marker-end="url(#arD)"/>
  <text x="348" y="94" fill="#f59e0b" font-size="11" font-weight="600" text-anchor="middle">Train away behavior</text>

  <!-- Bottom-up detail box -->
  <rect x="60" y="210" width="260" height="100" rx="8" fill="#172554" stroke="#3b82f6" stroke-width="1"/>
  <text x="190" y="235" fill="#93c5fd" font-size="12" font-weight="600" text-anchor="middle">Bottom-up (standard)</text>
  <text x="190" y="258" fill="#cbd5e1" font-size="11" text-anchor="middle">Ablate heads 9.9, 9.6, 10.0</text>
  <text x="190" y="275" fill="#cbd5e1" font-size="11" text-anchor="middle">Does IOI performance degrade?</text>
  <text x="190" y="298" fill="#22c55e" font-size="12" font-weight="600" text-anchor="middle">Commonly tested in MI</text>

  <!-- Top-down detail box -->
  <rect x="380" y="210" width="260" height="100" rx="8" fill="#451a03" stroke="#f59e0b" stroke-width="1"/>
  <text x="510" y="235" fill="#fcd34d" font-size="12" font-weight="600" text-anchor="middle">Top-down (rare)</text>
  <text x="510" y="258" fill="#cbd5e1" font-size="11" text-anchor="middle">Fine-tune to remove IOI capability</text>
  <text x="510" y="275" fill="#cbd5e1" font-size="11" text-anchor="middle">Does W_OV copying structure change?</text>
  <text x="510" y="298" fill="#ef4444" font-size="12" font-weight="600" text-anchor="middle">Rarely tested in MI</text>

  <!-- Constitutive relevance label -->
  <rect x="175" y="340" width="350" height="30" rx="15" fill="#0f172a" stroke="#6366f1" stroke-width="1.5"/>
  <text x="350" y="360" fill="#a5b4fc" font-size="12" font-weight="600" text-anchor="middle">Constitutive relevance requires both directions</text>
</svg>
