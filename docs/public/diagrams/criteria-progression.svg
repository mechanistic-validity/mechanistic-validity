<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 280" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arrowR" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="8" markerHeight="5" orient="auto">
      <path d="M 0 0 L 10 3 L 0 6 Z" fill="#64748b"/>
    </marker>
    <linearGradient id="fade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#92400e" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#065f46" stop-opacity="0.15"/>
    </linearGradient>
  </defs>

  <!-- Background gradient bar -->
  <rect x="40" y="110" width="880" height="60" rx="30" fill="url(#fade)"/>

  <!-- "Participates" label (left) -->
  <text x="30" y="90" fill="#b45309" font-size="13" font-weight="600" text-anchor="middle">Participates</text>
  <text x="30" y="105" fill="#92400e" font-size="10" text-anchor="middle">(necessity alone)</text>

  <!-- "Implements" label (right) -->
  <text x="930" y="90" fill="#059669" font-size="13" font-weight="600" text-anchor="middle">Implements</text>
  <text x="930" y="105" fill="#065f46" font-size="10" text-anchor="middle">(all five criteria)</text>

  <!-- I1 -->
  <rect x="55" y="118" width="150" height="44" rx="8" fill="#1e293b" stroke="#475569" stroke-width="1.5"/>
  <text x="130" y="137" fill="#f1f5f9" font-size="12" font-weight="600" text-anchor="middle">I1: Necessity</text>
  <text x="130" y="153" fill="#94a3b8" font-size="10" text-anchor="middle">Does removing it matter?</text>

  <line x1="210" y1="140" x2="232" y2="140" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrowR)"/>

  <!-- I2 -->
  <rect x="237" y="118" width="150" height="44" rx="8" fill="#1e293b" stroke="#475569" stroke-width="1.5"/>
  <text x="312" y="137" fill="#f1f5f9" font-size="12" font-weight="600" text-anchor="middle">I2: Sufficiency</text>
  <text x="312" y="153" fill="#94a3b8" font-size="10" text-anchor="middle">Does isolating it work?</text>

  <line x1="392" y1="140" x2="414" y2="140" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrowR)"/>

  <!-- I3 -->
  <rect x="419" y="118" width="150" height="44" rx="8" fill="#1e293b" stroke="#475569" stroke-width="1.5"/>
  <text x="494" y="137" fill="#f1f5f9" font-size="12" font-weight="600" text-anchor="middle">I3: Specificity</text>
  <text x="494" y="153" fill="#94a3b8" font-size="10" text-anchor="middle">Is it selective?</text>

  <line x1="574" y1="140" x2="596" y2="140" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrowR)"/>

  <!-- I4 -->
  <rect x="601" y="118" width="150" height="44" rx="8" fill="#1e293b" stroke="#475569" stroke-width="1.5"/>
  <text x="676" y="137" fill="#f1f5f9" font-size="12" font-weight="600" text-anchor="middle">I4: Consistency</text>
  <text x="676" y="153" fill="#94a3b8" font-size="10" text-anchor="middle">Does it replicate?</text>

  <line x1="756" y1="140" x2="778" y2="140" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrowR)"/>

  <!-- I5 -->
  <rect x="783" y="118" width="150" height="44" rx="8" fill="#1e293b" stroke="#475569" stroke-width="1.5"/>
  <text x="858" y="137" fill="#f1f5f9" font-size="12" font-weight="600" text-anchor="middle">I5: Confound ctrl</text>
  <text x="858" y="153" fill="#94a3b8" font-size="10" text-anchor="middle">Not collateral damage?</text>

  <!-- Bottom annotation: where most work stops -->
  <line x1="130" y1="168" x2="130" y2="210" stroke="#ef4444" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="130" y="228" fill="#ef4444" font-size="11" font-weight="500" text-anchor="middle">Most published</text>
  <text x="130" y="242" fill="#ef4444" font-size="11" font-weight="500" text-anchor="middle">MI stops here</text>

  <!-- The sufficiency gap annotation -->
  <line x1="220" y1="175" x2="220" y2="195" stroke="#f59e0b" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="220" y1="195" x2="300" y2="195" stroke="#f59e0b" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="300" y1="195" x2="300" y2="175" stroke="#f59e0b" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="260" y="215" fill="#f59e0b" font-size="10" font-weight="500" text-anchor="middle">The sufficiency gap</text>
</svg>
