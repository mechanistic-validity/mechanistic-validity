<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 580" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="av" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="7" markerHeight="5" orient="auto">
      <path d="M 0 0 L 10 3 L 0 6 Z" fill="#475569"/>
    </marker>
  </defs>

  <!-- Central construct node -->
  <ellipse cx="430" cy="50" rx="90" ry="35" fill="#3b82f6" stroke="#1d4ed8" stroke-width="2.5"/>
  <text x="430" y="46" fill="#fff" font-size="16" font-weight="700" text-anchor="middle">Induction</text>
  <text x="430" y="64" fill="#fff" font-size="16" font-weight="700" text-anchor="middle">head</text>

  <!-- Section label: PREDICTIONS -->
  <text x="430" y="125" fill="#a5b4fc" font-size="12" font-weight="600" text-anchor="middle" letter-spacing="3">PREDICTIONS</text>
  <line x1="100" y1="133" x2="760" y2="133" stroke="#334155" stroke-width="1"/>

  <!-- 6 prediction boxes in 2 rows of 3 -->
  <!-- Row 1 -->
  <rect x="60" y="150" width="200" height="55" rx="10" fill="#312e81" stroke="#6366f1" stroke-width="1.5"/>
  <text x="160" y="175" fill="#e0e7ff" font-size="13" font-weight="500" text-anchor="middle">Copies attended</text>
  <text x="160" y="193" fill="#e0e7ff" font-size="13" font-weight="500" text-anchor="middle">token to output</text>

  <rect x="310" y="150" width="240" height="55" rx="10" fill="#312e81" stroke="#6366f1" stroke-width="1.5"/>
  <text x="430" y="175" fill="#e0e7ff" font-size="13" font-weight="500" text-anchor="middle">Attends to token after</text>
  <text x="430" y="193" fill="#e0e7ff" font-size="13" font-weight="500" text-anchor="middle">previous occurrence</text>

  <rect x="600" y="150" width="200" height="55" rx="10" fill="#312e81" stroke="#6366f1" stroke-width="1.5"/>
  <text x="700" y="175" fill="#e0e7ff" font-size="13" font-weight="500" text-anchor="middle">Composes with</text>
  <text x="700" y="193" fill="#e0e7ff" font-size="13" font-weight="500" text-anchor="middle">previous-token head</text>

  <!-- Row 2 -->
  <rect x="60" y="225" width="200" height="55" rx="10" fill="#312e81" stroke="#6366f1" stroke-width="1.5"/>
  <text x="160" y="250" fill="#e0e7ff" font-size="13" font-weight="500" text-anchor="middle">Drives in-context</text>
  <text x="160" y="268" fill="#e0e7ff" font-size="13" font-weight="500" text-anchor="middle">learning</text>

  <rect x="310" y="225" width="240" height="55" rx="10" fill="#312e81" stroke="#6366f1" stroke-width="1.5"/>
  <text x="430" y="250" fill="#e0e7ff" font-size="13" font-weight="500" text-anchor="middle">Emerges as training</text>
  <text x="430" y="268" fill="#e0e7ff" font-size="13" font-weight="500" text-anchor="middle">phase transition</text>

  <rect x="600" y="225" width="200" height="55" rx="10" fill="#312e81" stroke="#6366f1" stroke-width="1.5"/>
  <text x="700" y="250" fill="#e0e7ff" font-size="13" font-weight="500" text-anchor="middle">Appears across</text>
  <text x="700" y="268" fill="#e0e7ff" font-size="13" font-weight="500" text-anchor="middle">model families</text>

  <!-- Arrows from construct to predictions -->
  <line x1="380" y1="80" x2="160" y2="148" stroke="#475569" stroke-width="1.2" marker-end="url(#av)"/>
  <line x1="430" y1="85" x2="430" y2="148" stroke="#475569" stroke-width="1.2" marker-end="url(#av)"/>
  <line x1="480" y1="80" x2="700" y2="148" stroke="#475569" stroke-width="1.2" marker-end="url(#av)"/>
  <line x1="370" y1="82" x2="160" y2="223" stroke="#475569" stroke-width="1.2" marker-end="url(#av)"/>
  <line x1="430" y1="85" x2="430" y2="223" stroke="#475569" stroke-width="1.2" marker-end="url(#av)"/>
  <line x1="490" y1="82" x2="700" y2="223" stroke="#475569" stroke-width="1.2" marker-end="url(#av)"/>

  <!-- Arrows from predictions to tests -->
  <line x1="160" y1="205" x2="160" y2="385" stroke="#475569" stroke-width="1.2" marker-end="url(#av)"/>
  <line x1="430" y1="205" x2="430" y2="385" stroke="#475569" stroke-width="1.2" marker-end="url(#av)"/>
  <line x1="700" y1="205" x2="700" y2="385" stroke="#475569" stroke-width="1.2" marker-end="url(#av)"/>
  <line x1="160" y1="280" x2="160" y2="460" stroke="#475569" stroke-width="1.2" marker-end="url(#av)"/>
  <line x1="430" y1="280" x2="430" y2="460" stroke="#475569" stroke-width="1.2" marker-end="url(#av)"/>
  <line x1="700" y1="280" x2="700" y2="460" stroke="#475569" stroke-width="1.2" marker-end="url(#av)"/>

  <!-- Section label: TESTED BY -->
  <text x="430" y="370" fill="#6ee7b7" font-size="12" font-weight="600" text-anchor="middle" letter-spacing="3">TESTED BY</text>
  <line x1="100" y1="378" x2="760" y2="378" stroke="#334155" stroke-width="1"/>

  <!-- 6 test boxes in 2 rows of 3 -->
  <!-- Row 1 (matches prediction row 1) -->
  <rect x="60" y="395" width="200" height="50" rx="10" fill="#064e3b" stroke="#10b981" stroke-width="1.5"/>
  <text x="160" y="415" fill="#d1fae5" font-size="13" font-weight="500" text-anchor="middle">CopyScore</text>
  <text x="160" y="433" fill="#6ee7b7" font-size="11" text-anchor="middle">W_OV matrix analysis</text>

  <rect x="310" y="395" width="240" height="50" rx="10" fill="#064e3b" stroke="#10b981" stroke-width="1.5"/>
  <text x="430" y="415" fill="#d1fae5" font-size="13" font-weight="500" text-anchor="middle">Attention pattern</text>
  <text x="430" y="433" fill="#6ee7b7" font-size="11" text-anchor="middle">on repeated sequences</text>

  <rect x="600" y="395" width="200" height="50" rx="10" fill="#064e3b" stroke="#10b981" stroke-width="1.5"/>
  <text x="700" y="415" fill="#d1fae5" font-size="13" font-weight="500" text-anchor="middle">Path patching</text>
  <text x="700" y="433" fill="#6ee7b7" font-size="11" text-anchor="middle">compositional circuit</text>

  <!-- Row 2 (matches prediction row 2) -->
  <rect x="60" y="465" width="200" height="50" rx="10" fill="#064e3b" stroke="#10b981" stroke-width="1.5"/>
  <text x="160" y="485" fill="#d1fae5" font-size="13" font-weight="500" text-anchor="middle">Ablation study</text>
  <text x="160" y="503" fill="#6ee7b7" font-size="11" text-anchor="middle">repeated vs non-repeated</text>

  <rect x="310" y="465" width="240" height="50" rx="10" fill="#064e3b" stroke="#10b981" stroke-width="1.5"/>
  <text x="430" y="485" fill="#d1fae5" font-size="13" font-weight="500" text-anchor="middle">Training dynamics</text>
  <text x="430" y="503" fill="#6ee7b7" font-size="11" text-anchor="middle">loss curve inflection point</text>

  <rect x="600" y="465" width="200" height="50" rx="10" fill="#064e3b" stroke="#10b981" stroke-width="1.5"/>
  <text x="700" y="485" fill="#d1fae5" font-size="13" font-weight="500" text-anchor="middle">Cross-model search</text>
  <text x="700" y="503" fill="#6ee7b7" font-size="11" text-anchor="middle">GPT-2, GPT-3, etc.</text>

  <!-- Legend -->
  <rect x="260" y="540" width="14" height="14" rx="3" fill="#312e81" stroke="#6366f1" stroke-width="1"/>
  <text x="280" y="552" fill="#94a3b8" font-size="12">Prediction the construct makes</text>
  <rect x="500" y="540" width="14" height="14" rx="3" fill="#064e3b" stroke="#10b981" stroke-width="1"/>
  <text x="520" y="552" fill="#94a3b8" font-size="12">How you test it</text>
</svg>
