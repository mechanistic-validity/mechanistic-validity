<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 720" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="7" markerHeight="5" orient="auto-start-reverse">
      <path d="M 0 0 L 10 3 L 0 6 Z" fill="#64748b"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="720" height="720" fill="none"/>

  <!-- Edges from center (360,340) to each node -->
  <!-- Top: Training phase change -->
  <line x1="360" y1="310" x2="360" y2="95" stroke="#475569" stroke-width="1.5" stroke-dasharray="none"/>
  <!-- Top-right: Attention pattern -->
  <line x1="390" y1="315" x2="585" y2="130" stroke="#475569" stroke-width="1.5"/>
  <!-- Right: Cross-model replication -->
  <line x1="400" y1="340" x2="610" y2="340" stroke="#475569" stroke-width="1.5"/>
  <!-- Bottom-right: Loss curve -->
  <line x1="390" y1="365" x2="585" y2="530" stroke="#475569" stroke-width="1.5"/>
  <!-- Bottom: In-context learning -->
  <line x1="360" y1="370" x2="360" y2="575" stroke="#475569" stroke-width="1.5"/>
  <!-- Bottom-left: Previous-token head -->
  <line x1="330" y1="365" x2="135" y2="530" stroke="#475569" stroke-width="1.5"/>
  <!-- Left: Copying via W_OV -->
  <line x1="320" y1="340" x2="110" y2="340" stroke="#475569" stroke-width="1.5"/>

  <!-- Edge labels — placed along each edge -->
  <text x="330" y="210" fill="#94a3b8" font-size="10.5" text-anchor="end" font-style="italic">dynamics prediction</text>
  <text x="505" y="200" fill="#94a3b8" font-size="10.5" text-anchor="middle" transform="rotate(-40, 505, 200)" font-style="italic">observable</text>
  <text x="505" y="325" fill="#94a3b8" font-size="10.5" text-anchor="middle" font-style="italic">observable</text>
  <text x="505" y="465" fill="#94a3b8" font-size="10.5" text-anchor="middle" transform="rotate(40, 505, 465)" font-style="italic">observable</text>
  <text x="390" y="480" fill="#94a3b8" font-size="10.5" text-anchor="start" font-style="italic">behavioral prediction</text>
  <text x="215" y="465" fill="#94a3b8" font-size="10.5" text-anchor="middle" transform="rotate(-40, 215, 465)" font-style="italic">compositional partner</text>
  <text x="215" y="325" fill="#94a3b8" font-size="10.5" text-anchor="middle" font-style="italic">structural signature</text>

  <!-- Outer nodes — Constructs (indigo) -->
  <!-- Top: Training phase change -->
  <rect x="275" y="40" width="170" height="50" rx="8" fill="#312e81" stroke="#6366f1" stroke-width="1.5"/>
  <text x="360" y="70" fill="#e0e7ff" font-size="13" font-weight="500" text-anchor="middle">Training phase change</text>

  <!-- Bottom: In-context learning -->
  <rect x="275" y="580" width="170" height="50" rx="8" fill="#312e81" stroke="#6366f1" stroke-width="1.5"/>
  <text x="360" y="610" fill="#e0e7ff" font-size="13" font-weight="500" text-anchor="middle">In-context learning</text>

  <!-- Bottom-left: Previous-token head -->
  <rect x="35" y="530" width="190" height="50" rx="8" fill="#312e81" stroke="#6366f1" stroke-width="1.5"/>
  <text x="130" y="560" fill="#e0e7ff" font-size="13" font-weight="500" text-anchor="middle">Previous-token head</text>

  <!-- Left: Copying via W_OV -->
  <rect x="10" y="315" width="180" height="50" rx="8" fill="#312e81" stroke="#6366f1" stroke-width="1.5"/>
  <text x="100" y="338" fill="#e0e7ff" font-size="13" font-weight="500" text-anchor="middle">Copying via W</text>
  <text x="152" y="347" fill="#c7d2fe" font-size="10" text-anchor="middle">OV</text>

  <!-- Outer nodes — Observables (emerald) -->
  <!-- Top-right: Attention pattern -->
  <rect x="520" y="80" width="190" height="55" rx="8" fill="#064e3b" stroke="#10b981" stroke-width="1.5"/>
  <text x="615" y="103" fill="#d1fae5" font-size="12.5" font-weight="500" text-anchor="middle">Attention pattern on</text>
  <text x="615" y="120" fill="#d1fae5" font-size="12.5" font-weight="500" text-anchor="middle">repeated sequences</text>

  <!-- Right: Cross-model replication -->
  <rect x="530" y="315" width="180" height="50" rx="8" fill="#064e3b" stroke="#10b981" stroke-width="1.5"/>
  <text x="620" y="345" fill="#d1fae5" font-size="12.5" font-weight="500" text-anchor="middle">Cross-model replication</text>

  <!-- Bottom-right: Loss curve inflection -->
  <rect x="520" y="520" width="190" height="55" rx="8" fill="#064e3b" stroke="#10b981" stroke-width="1.5"/>
  <text x="615" y="543" fill="#d1fae5" font-size="12.5" font-weight="500" text-anchor="middle">Loss curve</text>
  <text x="615" y="560" fill="#d1fae5" font-size="12.5" font-weight="500" text-anchor="middle">inflection point</text>

  <!-- Central node (on top of edges) -->
  <ellipse cx="360" cy="340" rx="75" ry="40" fill="#3b82f6" stroke="#1d4ed8" stroke-width="2.5"/>
  <text x="360" y="336" fill="#fff" font-size="15" font-weight="700" text-anchor="middle">Induction</text>
  <text x="360" y="354" fill="#fff" font-size="15" font-weight="700" text-anchor="middle">head</text>

  <!-- Legend -->
  <rect x="220" y="670" width="14" height="14" rx="3" fill="#312e81" stroke="#6366f1" stroke-width="1"/>
  <text x="240" y="682" fill="#94a3b8" font-size="11.5">Theoretical constructs</text>
  <rect x="410" y="670" width="14" height="14" rx="3" fill="#064e3b" stroke="#10b981" stroke-width="1"/>
  <text x="430" y="682" fill="#94a3b8" font-size="11.5">Observables</text>
</svg>
