<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 3 L 0 6 Z" fill="#94a3b8"/>
    </marker>
  </defs>

  <!-- Edges (drawn first, behind nodes) -->
  <!-- To constructs (top-left quadrant area) -->
  <line x1="400" y1="300" x2="160" y2="105" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)" marker-start="url(#arrow)"/>
  <line x1="400" y1="300" x2="160" y2="255" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)" marker-start="url(#arrow)"/>
  <line x1="400" y1="300" x2="160" y2="405" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)" marker-start="url(#arrow)"/>
  <line x1="400" y1="300" x2="160" y2="525" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)" marker-start="url(#arrow)"/>

  <!-- To observables (right side) -->
  <line x1="400" y1="300" x2="640" y2="105" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)" marker-start="url(#arrow)"/>
  <line x1="400" y1="300" x2="640" y2="300" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)" marker-start="url(#arrow)"/>
  <line x1="400" y1="300" x2="640" y2="495" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)" marker-start="url(#arrow)"/>

  <!-- Edge labels — constructs -->
  <text x="255" y="185" fill="#64748b" font-size="11" text-anchor="middle" transform="rotate(-39, 255, 185)">compositional partner</text>
  <text x="265" y="270" fill="#64748b" font-size="11" text-anchor="middle" transform="rotate(-8, 265, 270)">structural signature</text>
  <text x="265" y="340" fill="#64748b" font-size="11" text-anchor="middle" transform="rotate(17, 265, 340)">behavioral prediction</text>
  <text x="255" y="430" fill="#64748b" font-size="11" text-anchor="middle" transform="rotate(39, 255, 430)">dynamics prediction</text>

  <!-- Edge labels — observables -->
  <text x="545" y="185" fill="#64748b" font-size="11" text-anchor="middle" transform="rotate(39, 545, 185)">observable</text>
  <text x="545" y="290" fill="#64748b" font-size="11" text-anchor="middle">observable</text>
  <text x="545" y="415" fill="#64748b" font-size="11" text-anchor="middle" transform="rotate(-39, 545, 415)">observable</text>

  <!-- Central node -->
  <rect x="330" y="265" width="140" height="70" rx="35" fill="#3b82f6" stroke="#2563eb" stroke-width="2"/>
  <text x="400" y="296" fill="#fff" font-size="14" font-weight="600" text-anchor="middle">Induction</text>
  <text x="400" y="314" fill="#fff" font-size="14" font-weight="600" text-anchor="middle">head</text>

  <!-- Construct nodes (left side, purple/indigo) -->
  <rect x="60" y="80" width="200" height="50" rx="8" fill="#312e81" stroke="#4338ca" stroke-width="1.5"/>
  <text x="160" y="110" fill="#e0e7ff" font-size="13" font-weight="500" text-anchor="middle">Previous-token head</text>

  <rect x="60" y="230" width="200" height="50" rx="8" fill="#312e81" stroke="#4338ca" stroke-width="1.5"/>
  <text x="160" y="253" fill="#e0e7ff" font-size="13" font-weight="500" text-anchor="middle">Copying via W</text>
  <text x="207" y="253" fill="#e0e7ff" font-size="10" font-weight="500" text-anchor="middle">OV</text>

  <rect x="60" y="380" width="200" height="50" rx="8" fill="#312e81" stroke="#4338ca" stroke-width="1.5"/>
  <text x="160" y="410" fill="#e0e7ff" font-size="13" font-weight="500" text-anchor="middle">In-context learning</text>

  <rect x="60" y="500" width="200" height="50" rx="8" fill="#312e81" stroke="#4338ca" stroke-width="1.5"/>
  <text x="160" y="530" fill="#e0e7ff" font-size="13" font-weight="500" text-anchor="middle">Training phase change</text>

  <!-- Observable nodes (right side, teal/emerald) -->
  <rect x="540" y="75" width="200" height="60" rx="8" fill="#064e3b" stroke="#059669" stroke-width="1.5"/>
  <text x="640" y="100" fill="#d1fae5" font-size="13" font-weight="500" text-anchor="middle">Attention pattern on</text>
  <text x="640" y="118" fill="#d1fae5" font-size="13" font-weight="500" text-anchor="middle">repeated sequences</text>

  <rect x="540" y="270" width="200" height="60" rx="8" fill="#064e3b" stroke="#059669" stroke-width="1.5"/>
  <text x="640" y="295" fill="#d1fae5" font-size="13" font-weight="500" text-anchor="middle">Loss curve</text>
  <text x="640" y="313" fill="#d1fae5" font-size="13" font-weight="500" text-anchor="middle">inflection point</text>

  <rect x="540" y="465" width="200" height="60" rx="8" fill="#064e3b" stroke="#059669" stroke-width="1.5"/>
  <text x="640" y="490" fill="#d1fae5" font-size="13" font-weight="500" text-anchor="middle">Cross-model</text>
  <text x="640" y="508" fill="#d1fae5" font-size="13" font-weight="500" text-anchor="middle">replication</text>

  <!-- Legend -->
  <rect x="290" y="555" width="16" height="16" rx="3" fill="#312e81" stroke="#4338ca" stroke-width="1"/>
  <text x="312" y="568" fill="#94a3b8" font-size="12">Theoretical constructs</text>
  <rect x="470" y="555" width="16" height="16" rx="3" fill="#064e3b" stroke="#059669" stroke-width="1"/>
  <text x="492" y="568" fill="#94a3b8" font-size="12">Observables</text>
</svg>
