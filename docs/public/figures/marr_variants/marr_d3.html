<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Marr's Levels — D3.js</title>
<style>
  body { margin: 0; background: #fafafa; display: flex; justify-content: center; padding: 20px; }
  svg { filter: drop-shadow(0 2px 8px rgba(0,0,0,0.08)); }
  .level-label { font-weight: 700; }
  .sub-label { font-weight: 500; font-size: 13px; }
  .desc { font-size: 12px; fill: #555; }
  .arrow-label { font-size: 11.5px; }
  .drift-label { font-size: 13px; font-weight: 700; }
</style>
</head>
<body>
<script src="https://d3js.org/d3.v7.min.js"></script>
<script>
const W = 880, H = 620;
const svg = d3.select("body").append("svg").attr("width", W).attr("height", H);

// Background
svg.append("rect").attr("width", W).attr("height", H).attr("rx", 8).attr("fill", "#fafafa");

// Defs
const defs = svg.append("defs");
function addMarker(id, color) {
  defs.append("marker").attr("id", id).attr("viewBox", "0 0 10 10")
    .attr("refX", 8).attr("refY", 5).attr("markerWidth", 7).attr("markerHeight", 7)
    .attr("orient", "auto").append("path").attr("d", "M0,0 L10,5 L0,10 Z").attr("fill", color);
}
addMarker("arr-blue", "#0077b6");
addMarker("arr-teal", "#2a9d8f");
addMarker("arr-red", "#e63946");

// Gradient helper
function addGrad(id, c1, c2) {
  const g = defs.append("linearGradient").attr("id", id).attr("x1","0").attr("y1","0").attr("x2","0").attr("y2","1");
  g.append("stop").attr("offset", "0%").attr("stop-color", c1);
  g.append("stop").attr("offset", "100%").attr("stop-color", c2);
}
addGrad("gComp", "#dbeafe", "#bfdbfe");
addGrad("gAlgo", "#d1fae5", "#a7f3d0");
addGrad("gImpl", "#fef3c7", "#fde68a");

const colors = {comp: "#3b82f6", algo: "#2a9d8f", impl: "#d97706", drift: "#e63946"};

// Title
svg.append("text").attr("x", W/2).attr("y", 44).attr("text-anchor", "middle")
  .attr("font-size", 22).attr("font-weight", 600).attr("fill", "#1a1a2e")
  .attr("font-family", "system-ui, -apple-system, sans-serif")
  .text("Description Levels and Evidence Requirements");

svg.append("text").attr("x", W/2).attr("y", 68).attr("text-anchor", "middle")
  .attr("font-size", 13).attr("fill", "#6b7280").attr("font-style", "italic")
  .attr("font-family", "system-ui, sans-serif")
  .text("After Marr (1982), adapted for mechanistic interpretability");

const g = svg.append("g").attr("font-family", "system-ui, -apple-system, sans-serif");

// Level data
const levels = [
  {y: 90, h: 95, w: 420, label: "Computational", desc: "What is computed and why",
   grad: "gComp", stroke: colors.comp, labelColor: "#1e40af", descColor: "#1e3a5f"},
  {y: 260, h: 95, w: 420, label: "Algorithmic", desc: "What procedure is executed",
   grad: "gAlgo", stroke: colors.algo, labelColor: "#115e59", descColor: "#1a4a42"},
];

const cx = W/2;
levels.forEach(d => {
  const x = cx - d.w/2;
  g.append("rect").attr("x", x).attr("y", d.y).attr("width", d.w).attr("height", d.h)
    .attr("rx", 14).attr("fill", `url(#${d.grad})`).attr("stroke", d.stroke).attr("stroke-width", 2);
  g.append("text").attr("x", cx).attr("y", d.y + 42).attr("text-anchor", "middle")
    .attr("class", "level-label").attr("font-size", 21).attr("fill", d.labelColor).text(d.label);
  g.append("text").attr("x", cx).attr("y", d.y + 68).attr("text-anchor", "middle")
    .attr("class", "desc").attr("fill", d.descColor).text(d.desc);
});

// Implementational outer
const implY = 415, implH = 170, implW = 640, implX = cx - implW/2;
g.append("rect").attr("x", implX).attr("y", implY).attr("width", implW).attr("height", implH)
  .attr("rx", 16).attr("fill", "url(#gImpl)").attr("stroke", colors.impl).attr("stroke-width", 2);
g.append("text").attr("x", cx).attr("y", implY + 38).attr("text-anchor", "middle")
  .attr("class", "level-label").attr("font-size", 21).attr("fill", "#92400e").text("Implementational");

// Sub-modes
const subW = 138, subH = 52, subY = implY + 55, subGap = 15;
const subs = ["Topographic", "Connectomic", "Activation-\nstatistical", "Functional"];
const totalSubW = subs.length * subW + (subs.length-1) * subGap;
const subStartX = cx - totalSubW/2;

subs.forEach((label, i) => {
  const sx = subStartX + i * (subW + subGap);
  g.append("rect").attr("x", sx).attr("y", subY).attr("width", subW).attr("height", subH)
    .attr("rx", 10).attr("fill", "#fff7ed").attr("stroke", colors.impl).attr("stroke-width", 1.2);
  const lines = label.split("\n");
  lines.forEach((line, li) => {
    g.append("text").attr("x", sx + subW/2).attr("y", subY + subH/2 + (li - (lines.length-1)/2) * 16)
      .attr("text-anchor", "middle").attr("class", "sub-label").attr("fill", "#78350f").text(line);
  });
});

// Subtitle
g.append("text").attr("x", cx).attr("y", implY + implH - 12).attr("text-anchor", "middle")
  .attr("font-size", 11.5).attr("fill", "#92400e").attr("font-style", "italic")
  .text("Where most MI circuit claims actually operate");

// Arrows
// Impl → Algo
g.append("line").attr("x1", cx).attr("y1", implY - 2).attr("x2", cx).attr("y2", 358)
  .attr("stroke", colors.algo).attr("stroke-width", 2.2).attr("marker-end", "url(#arr-teal)");
// label bg
g.append("rect").attr("x", cx+12).attr("y", 370).attr("width", 122).attr("height", 38)
  .attr("rx", 6).attr("fill", "rgba(240,253,250,0.92)").attr("stroke", colors.algo).attr("stroke-width", 0.8);
g.append("text").attr("x", cx+73).attr("y", 385).attr("text-anchor", "middle")
  .attr("class", "arrow-label").attr("fill", "#115e59").text("I/O function");
g.append("text").attr("x", cx+73).attr("y", 400).attr("text-anchor", "middle")
  .attr("class", "arrow-label").attr("fill", "#115e59").text("demonstration");

// Algo → Comp
g.append("line").attr("x1", cx).attr("y1", 258).attr("x2", cx).attr("y2", 188)
  .attr("stroke", colors.comp).attr("stroke-width", 2.2).attr("marker-end", "url(#arr-blue)");
g.append("rect").attr("x", cx+12).attr("y", 205).attr("width", 138).attr("height", 38)
  .attr("rx", 6).attr("fill", "rgba(239,246,255,0.92)").attr("stroke", colors.comp).attr("stroke-width", 0.8);
g.append("text").attr("x", cx+81).attr("y", 220).attr("text-anchor", "middle")
  .attr("class", "arrow-label").attr("fill", "#1e40af").text("Generalization +");
g.append("text").attr("x", cx+81).attr("y", 235).attr("text-anchor", "middle")
  .attr("class", "arrow-label").attr("fill", "#1e40af").text("edge-case coverage");

// Common drift curved arrow
const driftPath = d3.path();
driftPath.moveTo(100, implY + implH/2);
driftPath.bezierCurveTo(55, 380, 60, 240, 85, 110);
g.append("path").attr("d", driftPath.toString())
  .attr("fill", "none").attr("stroke", colors.drift).attr("stroke-width", 3)
  .attr("stroke-dasharray", "10,6").attr("marker-end", "url(#arr-red)");

// Drift label
g.append("rect").attr("x", 16).attr("y", 300).attr("width", 74).attr("height", 46)
  .attr("rx", 6).attr("fill", "rgba(255,241,242,0.92)").attr("stroke", colors.drift).attr("stroke-width", 0.8);
g.append("text").attr("x", 53).attr("y", 319).attr("text-anchor", "middle")
  .attr("class", "drift-label").attr("fill", colors.drift).text("common");
g.append("text").attr("x", 53).attr("y", 337).attr("text-anchor", "middle")
  .attr("class", "drift-label").attr("fill", colors.drift).text("drift");

// Legend
const lg = g.append("g").attr("transform", "translate(670, 105)");
lg.append("rect").attr("width", 185).attr("height", 225).attr("rx", 10)
  .attr("fill", "white").attr("stroke", "#e5e7eb");
lg.append("text").attr("x", 92).attr("y", 28).attr("text-anchor", "middle")
  .attr("font-size", 13).attr("font-weight", 600).attr("fill", "#374151").text("Evidence needed");
lg.append("line").attr("x1", 15).attr("y1", 40).attr("x2", 170).attr("y2", 40).attr("stroke", "#e5e7eb");

const legendItems = [
  {color: colors.comp, label: "Computational:", lines: ["Generalization tests,", "edge-case coverage"], y: 65},
  {color: colors.algo, label: "Algorithmic:", lines: ["I/O behavior match,", "ablation studies"], y: 130},
  {color: colors.impl, label: "Implementational:", lines: ["Activation patterns,", "weight inspection"], y: 195},
];
legendItems.forEach(d => {
  lg.append("circle").attr("cx", 20).attr("cy", d.y).attr("r", 5).attr("fill", d.color);
  lg.append("text").attr("x", 32).attr("y", d.y+4).attr("font-size", 11.5).attr("fill", "#374151").text(d.label);
  d.lines.forEach((line, i) => {
    lg.append("text").attr("x", 32).attr("y", d.y + 18 + i*14).attr("font-size", 10.5).attr("fill", "#6b7280").text(line);
  });
});
</script>
</body>
</html>
